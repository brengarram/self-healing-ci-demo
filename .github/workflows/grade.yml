name: Grade PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to grade"
        required: true
        default: "main"

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        id: tests
        run: |
          set +e
          uv run pytest -q
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Check whether tests folder changed
        id: testfiles
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE="origin/main"
            git fetch origin main --depth=1
          else
            BASE="origin/${{ github.base_ref }}"
            git fetch origin ${{ github.base_ref }} --depth=1
          fi

          CHANGED=$(git diff --name-only $BASE...HEAD | grep '^tests/' || true)
          if [ -z "$CHANGED" ]; then
            echo "changed_tests=false" >> $GITHUB_OUTPUT
          else
            echo "changed_tests=true" >> $GITHUB_OUTPUT
          fi

      - name: Count changed lines
        id: diffsize
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE="origin/main"
            git fetch origin main --depth=1
          else
            BASE="origin/${{ github.base_ref }}"
            git fetch origin ${{ github.base_ref }} --depth=1
          fi

          LINES=$(git diff --shortstat $BASE...HEAD | grep -o '[0-9]\+ insertion\|[0-9]\+ deletion' | awk '{sum += $1} END {print sum+0}')
          echo "lines=$LINES" >> $GITHUB_OUTPUT

      - name: Calculate score
        id: score
        run: |
          SCORE=0
          if [ "${{ steps.tests.outputs.exit_code }}" = "0" ]; then
            SCORE=$((SCORE + 6))
          fi
          if [ "${{ steps.testfiles.outputs.changed_tests }}" = "false" ]; then
            SCORE=$((SCORE + 2))
          fi
          if [ "${{ steps.diffsize.outputs.lines }}" -le 30 ]; then
            SCORE=$((SCORE + 2))
          fi
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Find PR number for branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = "${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.head_ref }}";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`
            });
            const prNumber = prs.data.length ? prs.data[0].number : "";
            core.setOutput("number", String(prNumber));

      - name: Comment score on PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.score.outputs.score }}";
            const exitCode = "${{ steps.tests.outputs.exit_code }}";
            const changedTests = "${{ steps.testfiles.outputs.changed_tests }}";
            const lines = "${{ steps.diffsize.outputs.lines }}";

            const body = `### ✅ Auto-grade result
            Score: **${score} / 10**

            - Public tests exit code: **${exitCode}** (0 = pass)
            - Tests folder modified: **${changedTests}** (false = no)
            - Approx. lines changed: **${lines}**
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.pr.outputs.number }}"),
              body
            });