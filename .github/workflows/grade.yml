name: Grade PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        id: tests
        run: |
          set +e
          uv run pytest -q
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Collect changed paths
        id: paths
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          git fetch origin "$BASE_BRANCH" --depth=1

          CHANGED=$(git diff --name-only origin/$BASE_BRANCH...HEAD || true)

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          TESTS_CHANGED=false
          SRC_CHANGED=false

          if echo "$CHANGED" | grep -q '^tests/'; then
            TESTS_CHANGED=true
          fi

          if echo "$CHANGED" | grep -q '^src/'; then
            SRC_CHANGED=true
          fi

          echo "tests_changed=$TESTS_CHANGED" >> $GITHUB_OUTPUT
          echo "src_changed=$SRC_CHANGED" >> $GITHUB_OUTPUT

      - name: Calculate score
        id: score
        run: |
          SCORE=0

          # 6 pts -> tests pass
          if [ "${{ steps.tests.outputs.exit_code }}" = "0" ]; then
            SCORE=$((SCORE + 6))
          fi

          # 2 pts -> tests/ was not modified
          if [ "${{ steps.paths.outputs.tests_changed }}" = "false" ]; then
            SCORE=$((SCORE + 2))
          fi

          # 2 pts -> src/ was modified
          if [ "${{ steps.paths.outputs.src_changed }}" = "true" ]; then
            SCORE=$((SCORE + 2))
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Comment score on PR
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.score.outputs.score }}";
            const exitCode = "${{ steps.tests.outputs.exit_code }}";
            const testsChanged = "${{ steps.paths.outputs.tests_changed }}";
            const srcChanged = "${{ steps.paths.outputs.src_changed }}";
            const changedFiles = `${{ steps.paths.outputs.changed_files }}`.trim();

            const body = `### ✅ Auto-grade result
            Score: **${score} / 10**

            - Tests exit code: **${exitCode}** (0 = pass)
            - Tests folder modified: **${testsChanged}**
            - Source folder modified: **${srcChanged}**
            - Changed files:
            \`\`\`
            ${changedFiles || "No changed files detected"}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });