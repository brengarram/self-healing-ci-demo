name: Grade PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to grade"
        required: true
        default: "main"

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        id: tests
        run: |
          set +e
          uv run pytest -q
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.event.pull_request.head.sha }}

      - name: Collect diff info
        id: diffinfo
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE_BRANCH="main"
          else
          BASE_BRANCH="${{ github.base_ref }}"
          fi

          git fetch origin "$BASE_BRANCH" --depth=1

          FILES=$(git diff --name-only origin/$BASE_BRANCH...HEAD || true)

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          LINES=$(git diff --shortstat origin/$BASE_BRANCH...HEAD \
          | grep -o '[0-9]\+ insertion\|[0-9]\+ deletion' \
          | awk '{sum += $1} END {print sum+0}')

          echo "lines=${LINES:-0}" >> $GITHUB_OUTPUT

      - name: Calculate score
        id: score
        run: |
          SCORE=0

          # 6 pts → tests pass
          if [ "${{ steps.tests.outputs.exit_code }}" = "0" ]; then
            SCORE=$((SCORE + 6))
          fi

          # 2 pts → diff ≤ 80 lines
          if [ "${{ steps.diffinfo.outputs.lines }}" -le 80 ]; then
            SCORE=$((SCORE + 2))
          fi

          # 2 pts → only src/ changed
          FILES="${{ steps.diffinfo.outputs.changed_files }}"
          NON_SRC=$(echo "$FILES" | grep -v '^src/' || true)

          if [ -z "$NON_SRC" ]; then
            SCORE=$((SCORE + 2))
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Find PR number for branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = "${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.head_ref }}";
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`
            });

            const prNumber = prs.data.length ? prs.data[0].number : "";
            core.setOutput("number", String(prNumber));

      - name: Comment score on PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.score.outputs.score }}";
            const exitCode = "${{ steps.tests.outputs.exit_code }}";
            const lines = "${{ steps.diffinfo.outputs.lines }}";
            const changedFiles = `${{ steps.diffinfo.outputs.changed_files }}`.trim();

            const body = `### ✅ Auto-grade result
            Score: **${score} / 10**

            - Tests exit code: **${exitCode}** (0 = pass)
            - Approx. lines changed: **${lines}**
            - Changed files:
            \`\`\`
            ${changedFiles || "No changed files detected"}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.pr.outputs.number }}"),
              body
            });