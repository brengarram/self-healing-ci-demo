name: Grade PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to grade"
        required: true
        default: "main"

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        id: tests
        run: |
          set +e
          uv run pytest -q
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      - name: Collect changed paths
        id: paths
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          git fetch origin "$BASE_BRANCH" --depth=1

          CHANGED=$(git diff --name-only origin/$BASE_BRANCH...HEAD || true)

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          TESTS_CHANGED=false
          SRC_CHANGED=false

          if echo "$CHANGED" | grep -q '^tests/'; then
            TESTS_CHANGED=true
          fi

          if echo "$CHANGED" | grep -q '^src/'; then
            SRC_CHANGED=true
          fi

          echo "tests_changed=$TESTS_CHANGED" >> $GITHUB_OUTPUT
          echo "src_changed=$SRC_CHANGED" >> $GITHUB_OUTPUT

      - name: Calculate score
        id: score
        run: |
          SCORE=0

          # 6 pts -> tests pass
          if [ "${{ steps.tests.outputs.exit_code }}" = "0" ]; then
            SCORE=$((SCORE + 6))
          fi

          # 2 pts -> tests/ was not modified
          if [ "${{ steps.paths.outputs.tests_changed }}" = "false" ]; then
            SCORE=$((SCORE + 2))
          fi

          # 2 pts -> src/ was modified
          if [ "${{ steps.paths.outputs.src_changed }}" = "true" ]; then
            SCORE=$((SCORE + 2))
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Comment score on PR
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.score.outputs.score }}";
            const exitCode = "${{ steps.tests.outputs.exit_code }}";
            const testsChanged = "${{ steps.paths.outputs.tests_changed }}";
            const srcChanged = "${{ steps.paths.outputs.src_changed }}";
            const changedFiles = `${{ steps.paths.outputs.changed_files }}`.trim();

            const body = `### ✅ Auto-grade result
            Score: **${score} / 10**

            - Tests exit code: **${exitCode}** (0 = pass)
            - Tests folder modified: **${testsChanged}**
            - Source folder modified: **${srcChanged}**
            - Changed files:
            \`\`\`
            ${changedFiles || "No changed files detected"}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

              - name: Detect autofix commit
        id: autofix
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          LAST_AUTHOR=$(git log -1 --pretty=%an)

          echo "last_msg=$LAST_MSG" >> $GITHUB_OUTPUT
          echo "last_author=$LAST_AUTHOR" >> $GITHUB_OUTPUT

          if echo "$LAST_MSG" | grep -qi "^autofix:"; then
            echo "is_autofix=true" >> $GITHUB_OUTPUT
          else
            echo "is_autofix=false" >> $GITHUB_OUTPUT
          fi

      - name: Build autofix summary
        if: steps.autofix.outputs.is_autofix == 'true'
        id: summary
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "stat<<EOF" >> $GITHUB_OUTPUT
          git diff --stat HEAD~1 HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "patch<<EOF" >> $GITHUB_OUTPUT
          git diff --unified=0 HEAD~1 HEAD | sed -n '1,120p' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment autofix summary on PR
        if: steps.autofix.outputs.is_autofix == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const lastMsg = `${{ steps.autofix.outputs.last_msg }}`;
            const lastAuthor = `${{ steps.autofix.outputs.last_author }}`;
            const files = `${{ steps.summary.outputs.files }}`.trim();
            const stat = `${{ steps.summary.outputs.stat }}`.trim();
            const patch = `${{ steps.summary.outputs.patch }}`.trim();

            const body = `### 🤖 Auto-fix summary

            The latest commit appears to be an AI-generated fix.

            - **Commit message:** \`${lastMsg}\`
            - **Author:** ${lastAuthor}

            **Changed files**
            \`\`\`
            ${files || "No files detected"}
            \`\`\`

            **Diff summary**
            \`\`\`
            ${stat || "No diff stat available"}
            \`\`\`

            **Patch preview**
            \`\`\`diff
            ${patch || "No patch preview available"}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });  